name: Release Windows Binaries

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for manual runs)
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ github.event.inputs.tag }}" ]]; then
            RELEASE_TAG="${{ github.event.inputs.tag }}"
          else
            RELEASE_TAG="v$(git rev-parse --short=12 "${{ github.sha }}")"
          fi
          echo "tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create and push tag
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.tag == '' }}
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          if git rev-parse "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Tag ${RELEASE_TAG} already exists, skipping tag creation."
            exit 0
          fi
          git tag "${RELEASE_TAG}"
          git push origin "${RELEASE_TAG}"

      - name: Build binaries
        shell: bash
        run: |
          mkdir -p dist
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/mullvad-ping.exe ./cmd/mullvad-ping
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/mullvad-benchmark.exe ./cmd/mullvad-benchmark
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/mullvad-list-builder.exe ./cmd/mullvad-list-builder

      - name: Package release bundle
        shell: pwsh
        run: |
          Compress-Archive `
            -Path "dist/mullvad-ping.exe","dist/mullvad-benchmark.exe","dist/mullvad-list-builder.exe","${{ github.workspace }}\\Start-MullvadBenchmark.ps1" `
            -DestinationPath "dist/mullvad-find-fastest-windows-amd64.zip" `
            -Force

      - name: Generate changelog
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.release.outputs.tag }}"
          PREVIOUS_TAG="$(git tag --sort=-creatordate | sed -n '1p')"
          if [[ "${PREVIOUS_TAG}" == "${RELEASE_TAG}" ]]; then
            PREVIOUS_TAG="$(git tag --sort=-creatordate | sed -n '2p')"
          fi
          {
            echo "# Release ${RELEASE_TAG}"
            echo ""
            echo "## Changelog"
            if [[ -z "${PREVIOUS_TAG}" ]]; then
              git log --no-merges --pretty='- %h %s (%an)' --max-count=120
            else
              git log --no-merges --pretty='- %h %s (%an)' "${PREVIOUS_TAG}..${RELEASE_TAG}"
            fi
          } > release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: "Mullvad find fastest ${{ steps.release.outputs.tag }}"
          body_path: release-notes.md
          files: |
            dist/mullvad-find-fastest-windows-amd64.zip
